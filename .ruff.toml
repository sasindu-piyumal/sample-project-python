# Ruff linter configuration
# Provides Python code quality checks and enforces coding standards
# Compatible with black (88 char line length) and isort

# Enforce line length matching black's default
line-length = 88

# Minimum supported Python version
target-version = "py38"

# Rule selection and enforcement
select = [
    "E",      # Pycodestyle errors
    "W",      # Pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
]

# Ignore false positives and conflicts with black
ignore = [
    "E203",   # Whitespace before ':' (conflicts with black)
    "W503",   # Line break before binary operator (conflicts with black)
]

# Directories to check (applies to both source and test files)
include = ["src/**/*.py", "tests/**/*.py"]

# Directories to exclude
exclude = [
    ".venv",
    ".git",
    "__pycache__",
    "dist",
    "build",
    ".pytest_cache",  # Pytest cache directory
]

# Configuration for isort compatibility
[tool.ruff.isort]
profile = "black"
